# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=assets:10m rate=50r/s;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Gzip compression (wasm compresses ~2-3x)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json application/wasm;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Content Security Policy
    # 'wasm-unsafe-eval' is REQUIRED for WebAssembly.instantiateStreaming in
    # Chromium under CSP. Vite emits external scripts, so no 'unsafe-inline'.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;

    # Cache static assets with rate limiting (Vite hashes filenames -> immutable)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|mjs|svg|woff|woff2|ttf|eot|wasm)$ {
        limit_req zone=assets burst=20 nodelay;
        expires 1y;
        add_header Cache-Control "public, immutable";
        # A location-level types block REPLACES the inherited one, so every
        # extension matched above must be listed. application/wasm is the
        # critical entry: instantiateStreaming hard-fails on a wrong MIME type.
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/gif gif;
            image/x-icon ico;
            text/css css;
            application/javascript js mjs;
            image/svg+xml svg;
            font/woff woff;
            font/woff2 woff2;
            font/ttf ttf;
            application/vnd.ms-fontobject eot;
            application/wasm wasm;
        }
    }

    # Handle SPA routing - try files first, then fallback to index.html
    location / {
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ $uri.html /index.html;
    }

    # 404 handling
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Limit request methods
    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }
}
